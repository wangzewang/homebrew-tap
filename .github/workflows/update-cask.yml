name: Update Cask

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 0.2.0)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute sha256
        id: sha
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARM_URL="https://github.com/wangzewang/fluxtty/releases/download/v${VERSION}/fluxtty_${VERSION}_aarch64.dmg"
          X86_URL="https://github.com/wangzewang/fluxtty/releases/download/v${VERSION}/fluxtty_${VERSION}_x86_64.dmg"

          ARM_SHA=$(curl -sL "$ARM_URL" | sha256sum | awk '{print $1}')
          X86_SHA=$(curl -sL "$X86_URL" | sha256sum | awk '{print $1}')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "arm_sha=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "x86_sha=$X86_SHA" >> $GITHUB_OUTPUT

      - name: Update fluxtty.rb
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          ARM_SHA="${{ steps.sha.outputs.arm_sha }}"
          X86_SHA="${{ steps.sha.outputs.x86_sha }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/fluxtty.rb

          # Replace sha256 values in order (arm first, then intel)
          awk -v arm="$ARM_SHA" -v x86="$X86_SHA" '
            /on_arm/  { in_arm=1 }
            /on_intel/ { in_arm=0; in_intel=1 }
            in_arm && /sha256/ { sub(/"[^"]*"/, "\"" arm "\"") }
            in_intel && /sha256/ { sub(/"[^"]*"/, "\"" x86 "\""); in_intel=0 }
            { print }
          ' Casks/fluxtty.rb > tmp.rb && mv tmp.rb Casks/fluxtty.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/fluxtty.rb
          git diff --cached --quiet && echo "No changes, skipping commit." && exit 0
          git commit -m "feat: update fluxtty to v${{ steps.sha.outputs.version }}"
          git push
